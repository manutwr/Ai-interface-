<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Google Font (Inter/Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #b3b3b3; /* Matching the image background container padding */
        }
        /* Soft purple glow effect for the input area as seen in 3163.png */
        .glow-box {
            box-shadow: 0 0 50px 10px rgba(147, 51, 234, 0.06);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-12">

    <!-- Main Canvas Container -->
    <div class="w-full max-w-[1200px] aspect-[16/10] bg-white rounded-xl shadow-2xl flex overflow-hidden select-none">
        
        <!-- ================= SIDEBAR NAV ================= -->
        <aside class="w-16 border-r border-gray-100 flex flex-col justify-between items-center py-6 bg-white relative">
            <!-- Active indicator tab behind home icon -->
            <div class="absolute left-0 top-[22px] w-1 h-8 bg-purple-600 rounded-r"></div>
            
            <!-- Top Icons Group -->
            <div class="flex flex-col gap-6 items-center w-full">
                <button class="w-10 h-10 flex items-center justify-center text-purple-600 bg-purple-50 rounded-lg text-lg">
                    <i class="fa-solid fa-house"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-regular fa-file-lines"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-regular fa-clock"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-regular fa-bookmark"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-regular fa-comment"></i>
                </button>
            </div>

            <!-- Bottom Icons Group -->
            <div class="flex flex-col gap-5 items-center w-full">
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg">
                    <i class="fa-solid fa-database"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-600 transition text-lg mt-2">
                    <div class="w-7 h-7 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 text-sm">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </button>
            </div>
        </aside>

        <!-- ================= MAIN WORKSPACE ================= -->
        <main class="flex-1 flex flex-col p-6 justify-between relative bg-white">
            
            <!-- Top Navbar Controls -->
            <section class="flex justify-between items-center w-full">
                <!-- Dropdown Selector -->
                <div class="relative">
                    <button class="border border-gray-300 rounded-md px-3 py-1.5 text-xs font-medium text-gray-600 flex items-center gap-4 bg-white hover:bg-gray-50 transition shadow-sm">
                        <span>lem GPT 4.o</span>
                        <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                    </button>
                </div>

                <!-- Global Action Header Buttons -->
                <div class="flex items-center gap-3">
                    <button class="border border-gray-200 shadow-sm rounded-md px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700 bg-white flex items-center gap-2 transition">
                        <i class="fa-solid fa-magnifying-glass text-[11px] text-gray-400"></i>
                        <span>search</span>
                    </button>
                    <button class="border border-gray-200 shadow-sm rounded-md px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700 bg-white flex items-center gap-2 transition">
                        <i class="fa-solid fa-globe text-[11px] text-gray-400"></i>
                        <span>history</span>
                    </button>
                    <button class="bg-black text-white rounded-md px-3 py-1.5 text-xs font-medium hover:bg-gray-800 transition flex items-center gap-1.5 shadow-sm">
                        <span>New Page</span>
                        <i class="fa-solid fa-plus text-[10px]"></i>
                    </button>
                </div>
            </section>

            <!-- Center Heading Prompt -->
            <section class="text-center my-auto flex flex-col items-center justify-center transform -translate-y-4">
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide text-black uppercase select-text">
                    HELLO MANU, HOW CAN I HELP YOU
                </h1>
                <h2 class="text-2xl md:text-3xl font-extrabold tracking-wide text-black uppercase mt-1 select-text">
                    I AM YOUR <span class="text-purple-500">PERSONAL ASSISTANT</span>
                </h2>
            </section>

            <!-- Bottom Prompt Input Area Container -->
            <section class="w-full max-w-3xl mx-auto mb-6 relative z-10">
                <div class="glow-box border border-purple-100 rounded-xl bg-white p-4 flex flex-col justify-between h-44 transition-all focus-within:border-purple-300">
                    <!-- Text Area Input field -->
                    <textarea 
                        class="w-full resize-none outline-none text-sm text-gray-700 placeholder-gray-400 bg-transparent h-28"
                        placeholder="Ask questions............"
                    ></textarea>
                    
                    <!-- Input Actions Toolbar Footer -->
                    <div class="flex justify-between items-center border-t border-gray-50 pt-3">
                        <button class="border border-gray-300 rounded-md px-2.5 py-1 text-xs text-gray-600 flex items-center gap-1.5 hover:bg-gray-50 transition">
                            <i class="fa-solid fa-paperclip text-gray-400 transform rotate-45 text-[11px]"></i>
                            <span class="font-medium text-[11px]">Attachment</span>
                        </button>
                        
                        <button class="w-8 h-8 rounded-full bg-purple-500 hover:bg-purple-600 text-white flex items-center justify-center shadow transition-all active:scale-95">
                            <i class="fa-solid fa-arrow-right text-sm"></i>
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>
</html>
